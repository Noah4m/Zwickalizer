services:
  agent:
    build: ./agent
    container_name: matai-agent
    command: uvicorn api_server:app --host 0.0.0.0 --port 8003 --reload
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPEN_API_KEY: ${OPEN_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      AGENT_PORT: 8003
      MONGO_URI: ${MONGO_URI:-mongodb://host.docker.internal:27017}
      MONGO_DB: ${MONGO_DB:-txp_clean}
      MCP_SERVER_ROOT: /mcp-server
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8003:8003"
    volumes:
      - ./agent:/app
      - ./mcp-server:/mcp-server
    networks:
      - matai-net

  backend:
    build: ./backend
    container_name: matai-backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      AGENT_URL: http://agent:8003
      BACKEND_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - agent
    networks:
      - matai-net

  frontend:
    build: ./frontend
    container_name: matai-frontend
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      VITE_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - matai-net

networks:
  matai-net:
    driver: bridge
